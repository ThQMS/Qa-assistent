<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Robô do Qa Assistent — mesma identidade da mascote em CSS -->
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6cbff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- antena -->
  <rect x="30.75" y="7" width="2.5" height="8" rx="1.25" fill="#c4b5fd"/>
  <circle cx="32" cy="6" r="3.2" fill="#7ee0a8"/>

  <!-- cabeça -->
  <rect x="12" y="15" width="40" height="26" rx="10" fill="url(#head)"/>
  <!-- rosto -->
  <rect x="17" y="20" width="30" height="16" rx="7" fill="#0c0911"/>
  <!-- olhos -->
  <circle cx="26" cy="28" r="3" fill="#7ee0a8"/>
  <circle cx="38" cy="28" r="3" fill="#7ee0a8"/>
  <!-- boca -->
  <rect x="28" y="32.5" width="8" height="1.8" rx="0.9" fill="#7ee0a8"/>

  <!-- braços -->
  <rect x="6" y="44" width="7" height="3.5" rx="1.75" fill="#c4b5fd"/>
  <rect x="51" y="44" width="7" height="3.5" rx="1.75" fill="#c4b5fd"/>

  <!-- corpo -->
  <rect x="18" y="44" width="28" height="12" rx="6" fill="url(#body)"/>
  <!-- núcleo -->
  <circle cx="32" cy="50" r="2.6" fill="#7ee0a8"/>
</svg>
